name: news-bot
on:
  schedule:
    - cron: "0 0,3,6,9,12,15,18,21 * * *"
    - cron: "45 0,3,6,9,12,15,18,21 * * *"
    - cron: "30 1,4,7,10,13,16,19,22 * * *"
    - cron: "15 2,5,8,11,14,17,20,23 * * *"
    - cron: "0 5,17 * * *"
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: news-bot
  cancel-in-progress: false
jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm install
      - run: node bot.js
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          TZ: "Europe/Kyiv"
      - name: commit state
        env:
          GIT_TERMINAL_PROMPT: "0"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet && exit 0
          git commit -m "state update"
          timeout 45 git pull --rebase -X ours origin main || true
          timeout 45 git push origin HEAD:main || echo "push failed"
